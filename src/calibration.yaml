# =============================================================================
# Calibration for ZJU-FAST-Lab VID-Dataset
# Sources:   [P]   Zhang et al., arXiv 2103.11152 (the paper)
#            [VD]  github.com/ZJU-FAST-Lab/VID-Dataset
#            [VFP] github.com/ZJU-FAST-Lab/VID-Flight-Platform
#            [VF]  github.com/ZJU-FAST-Lab/VID-Fusion (config files)
#            [EST] estimated, not reported in any source — see notes
# =============================================================================
# Notation: CoG - Geometric Centre, CoM - Center of Mass. Since CoM is not reported we use CoM ≈ CoG. 


drone_parameters:                      # X-config quadcopter
  arm_length: 0.325                    # [m] CoG → rotor; = wheelbase/2
                                       # Source: [P Tab II] "650mm wheelbase";
  mass: 3.0961                         # [kg]
                                       # Source: [VD In directory name of rosbag]                               
  inertia_tensor:                      # [kg·m^2] diag(Jxx, Jyy, Jzz)
    - 0.083                            # Jxx        [EST]
    - 0.083                            # Jyy        [EST]
    - 0.163                            # Jzz        [EST]
                                       # Replace with measured values when
                                       # available (bifilar pendulum, or
                                       # Burri-2016 MLE identification).

  # Rotor numbering (ours):     1=FR-CW  2=RR-CCW  3=RL-CW  4=FL-CCW
  # Rotor numbering (paper):    1=FR     2=FL      3=RL     4=RR [P Tab III caption]
  # Therefore (our idx → paper idx): 1→1, 2→4, 3→3, 4→2
  # Sign convention: |k_m| used here; sign comes from mixing matrix.
  # Spin pairing in [P]: rotors {1,3} share one direction, {2,4} the other.
  
  rotor_1:                             # FR (CW) — paper rotor 1
    thrust_coeff: 2.6890e-7            # [N/rpm^2]   T = k_t · n^2
    torque_coeff: 5.6343e-9            # [N·m/rpm^2] |k_m|, sign from mixer
  rotor_2:                             # RR (CCW) — paper rotor 4
    thrust_coeff: 2.7741e-7
    torque_coeff: 4.8260e-9
  rotor_3:                             # RL (CW) — paper rotor 3
    thrust_coeff: 2.7263e-7
    torque_coeff: 5.7012e-9
  rotor_4:                             # FL (CCW) — paper rotor 2
    thrust_coeff: 2.8190e-7
    torque_coeff: 4.7180e-9
                                       # Source: [P Tab III]


sensor_parameters:                     # all from [P Tab II]
  noise_tacho:    1.459                # [rpm/√Hz]
  noise_gyro:     0.001                # [rad/s/√Hz]
  bias_rw_gyro:   3.500e-5             # [rad/s^2/√Hz]
  noise_acc:      0.100                # [m/s^2/√Hz]
  bias_rw_acc:    4.000e-3             # [m/s^3/√Hz]
  noise_force:                         # [N]   force-sensor static-test noise
    - 0.1
    - 0.1
    - 0.1
  noise_torque:                        # [N·m] torque-sensor static-test noise
    - 5.0e-3
    - 5.0e-3
    - 3.0e-3


# =============================================================================
# Camera intrinsics: PINHOLE Model
# =============================================================================
# Topics in the bag are /camera/infra1/image_rect_raw and
# /camera/infra2/image_rect_raw — these are stereo-rectified IR images, so
# distortion is zero by construction.
#
# Values below are from VID-Fusion's real_drone.yaml [VF], which is calibrated
# for the same camera model (D435i). real_drone.yaml's intrinsics ARE for a different physical D435i unit. 
# Same model, different serial number. Per-unit factory-cal variation is small (~1%). Best available.
# =============================================================================

camera_intrinsics:

  left:
    size:                              # [W, H] in pixels — from [P Tab II]
      - 640
      - 480
    dist_coeff:                        # rectified IR → all zero
      - 0.0                            # k1
      - 0.0                            # k2
      - 0.0                            # p1
      - 0.0                            # p2
    k_matrix:                          # [VF]
      - [384.18206787109375,   0.0,             320.95831298828125]
      - [  0.0,              384.18206787109375, 237.53884887695312]
      - [  0.0,                0.0,                1.0]

  right:
    size:
      - 640
      - 480
    dist_coeff:                        # rectified IR → all zero
      - 0.0
      - 0.0
      - 0.0
      - 0.0
    k_matrix:                          
      - [384.18206787109375,   0.0,             320.95831298828125]
      - [  0.0,              384.18206787109375, 237.53884887695312]
      - [  0.0,                0.0,                1.0]

# =============================================================================
# Camera extrinsics — pose from body frame B to camera frame
# =============================================================================
# Body frame B: FRD (x fwd, y right, z down), origin at CoM ≈ CoG.
# Camera frame C: RealSense convention (x right, y down, z fwd).
# IMU frame I, CoG frame G: both FLU (x fwd, y left, z up) [P Fig 2].
#
# Translation chain, in body FRD [m]:
#   CoG → camera front panel center (= Intel D435 CAD origin):
#     t = (0.1887, 0, -0.020505)        [VFP] STP measurement
#
#   Camera front panel center → left IR optical center:
#     t_l = (-0.0043, -0.0175, 0)
#       x: 4.3 mm behind front face (left-IR optical center).
#          front-glass-to-imager 4.2 mm + [LRS issue 999] glass
#          0.1 mm proud of body face
#       y: -17.5 mm (left of front-panel center). 
#          CAD measurement.
#       z: 0.
#
#   Camera front panel center → right IR optical center:
#     t_r = (-0.0043, 0.0325, 0)
#       
#
# Combine:
#   t_L^B = t + t_l = (0.1844, -0.0175, -0.020505)  m
#   t_R^B = t + t_r = (0.1844,  0.0325, -0.020505)  m
#   |t_R^B - t_L^B|_y = 0.050 m = stereo baseline   ✓
#
# Rotation R_BC (nominal forward mount, no roll about optical axis):
#   cam x (right) = body y → col 1 = (0, 1, 0)
#   cam y (down)  = body z → col 2 = (0, 0, 1)
#   cam z (fwd)   = body x → col 3 = (1, 0, 0)
#   R_BC  = [[0,0,1],[1,0,0],[0,1,0]]
#   R_LB  = R_RB = R_BC^T = [[0,1,0],[0,0,1],[1,0,0]]
#
# SE(3) "pose from B to L", applied as p^L = T_LB · p^B:
#   T_LB translation = -R_LB · t_L^B = ( 0.0175, 0.020505, -0.1844) m
#   T_RB translation = -R_RB · t_R^B = (-0.0325, 0.020505, -0.1844) m
#
# CAVEAT: rotation R_BC is the nominal mount (no Kalibr-calibrated value
# published by [P]). Any few-degree mounting misalignment is unmodelled.
# =============================================================================

camera_extrinsics:
  baseline: 0.05                         # [m] [P Tab II]
  left:
    com_cam:                           # T_LB ∈ SE(3): pose from B to L
      - [0.0, 1.0, 0.0,   0.0175]
      - [0.0, 0.0, 1.0,   0.020505]
      - [1.0, 0.0, 0.0,  -0.1844]
      - [0.0, 0.0, 0.0,   1.0]
  right:
    com_cam:                           # T_RB ∈ SE(3): pose from B to R
      - [0.0, 1.0, 0.0,  -0.0325]
      - [0.0, 0.0, 1.0,   0.020505]
      - [1.0, 0.0, 0.0,  -0.1844]
      - [0.0, 0.0, 0.0,   1.0]